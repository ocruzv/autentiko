<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Auténtiko Café, cafetería en Guadalajara y café de Chiapas en línea">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f0e5" />
      <stop offset="100%" stop-color="#ead8b9" />
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="18%" r="40%">
      <stop offset="0%" stop-color="#d9ad5b" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#d9ad5b" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect x="40" y="40" width="1120" height="550" rx="32" fill="#f8f4ec" stroke="#d7cab3" />
  <circle cx="160" cy="150" r="72" fill="#2d6a5b" />
  <circle cx="160" cy="150" r="38" fill="#f8f4ec" />
