  <text x="255" y="210" fill="#2d6a5b" font-size="28" font-family="Arial, sans-serif" letter-spacing="4">CAFETERÍA EN GUADALAJARA SUR</text>
  <text x="95" y="330" fill="#221712" font-size="66" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Café de Chiapas, desayuno</text>
  <text x="95" y="402" fill="#221712" font-size="66" font-family="Georgia, 'Times New Roman', serif" font-weight="700">y baguettes con sello</text>
